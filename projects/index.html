<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Instagram Profile Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Parkinsans:wght@300..800&display=swap"
    rel="stylesheet">
</head>

<body>


  <div class="hamburger" id="hamburger">
    <img src="../static/Instagram_simple_icon.svg" alt="">
  </div>


  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="icon-bar" id="sidebar">
      <div class="icon"><a href="/"><img src="../static/svgviewer-png-output (1).png" alt="404" srcset=""></a></div>
      <div class="icon"><a href="/projects/"><img src="../static/svgviewer-png-output (14).png" alt="404" srcset=""></a></div>
      <div class="icon"><a href="/skills/"><img src="../static/svgviewer-png-output (6).png" alt="" srcset=""></a></div>
      <div class="icon"><img src="../static/svgviewer-png-output (3).png" alt="" srcset=""></div>
      <div class="icon"><a href="/addnew/"><img src="../static/svgviewer-png-output (4).png" alt=""></a></div>
      <div class="icon"><a href="/profile/"><img src="../static/svgviewer-png-output (5).png" alt=""></a></div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="profile-container">

      <div class="header">
        <h2>Projects</h2>
        <span></span>
      </div>
   







    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
